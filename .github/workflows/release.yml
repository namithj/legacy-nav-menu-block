# ──────────────────────────────────────────────────────────────
# Release – build, create GitHub release with .zip, publish npm
#
# Triggered when a semver tag (v*.*.*) is pushed.
#
# Secrets required:
#   NPM_TOKEN – npm access token with publish permission
#               (only needed if publishing to npm registry)
# ──────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write    # needed to create GitHub Releases
  packages: write    # needed to publish to GitHub Packages

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node.js ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@namithj'

      # ── Install & Build ──
      - name: Install dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build

      # ── WordPress plugin .zip ──
      #    The zip contains everything a site needs to install
      #    the plugin: PHP bootstrap, build/ directory, readme.
      - name: Create plugin zip
        run: |
          PLUGIN_SLUG="legacy-nav-menu-block"
          mkdir -p "$PLUGIN_SLUG"
          cp -r build/           "$PLUGIN_SLUG/build/"
          cp    legacy-nav-menu.php "$PLUGIN_SLUG/"
          cp    readme.txt       "$PLUGIN_SLUG/" 2>/dev/null || true
          cp    LICENSE          "$PLUGIN_SLUG/" 2>/dev/null || true
          zip -r "${PLUGIN_SLUG}.zip" "$PLUGIN_SLUG"
          echo "PLUGIN_ZIP=${PLUGIN_SLUG}.zip" >> "$GITHUB_ENV"

      # ── Extract version from tag ──
      - name: Determine version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # ── GitHub Release ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ env.VERSION }}
          generate_release_notes: true
          files: ${{ env.PLUGIN_ZIP }}

      # ── Publish to GitHub Packages npm registry ──
      - name: Publish to npm (GitHub Packages)
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
