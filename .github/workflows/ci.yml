# ──────────────────────────────────────────────────────────────
# CI – lint & build on every push / pull-request
# ──────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Lint CSS
        run: npm run lint:css

      - name: Build
        run: npm run build

      - name: Verify build output exists
        run: |
          test -f build/legacy-nav-menu/block.json
          test -f build/legacy-nav-menu/index.js
          test -f build/legacy-nav-menu/render.php
          echo "✓ Build artifacts verified"
